name: SovereignShield DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Basic Node Security Audit
        run: |
          cd frontend && npm install --package-lock-only && npm audit --audit-level=high || true
          cd ../backend && npm install --package-lock-only && npm audit --audit-level=high || true

  build-frontend:
    name: Build Frontend (Vite)
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Dependencies
        run: cd frontend && npm install
      - name: Build
        run: cd frontend && npm run build
      
  build-and-deploy-backend:
    name: Build & Deploy Backend (Docker)
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install Dependencies
        run: cd backend && npm install
      
      - name: Build Docker Image
        run: |
          cd backend
          docker build -t sovereignshield-backend .
          
      - name: Mock Render/Railway Deployment
        run: echo "Deploying Docker container to Cloud Platform..."
