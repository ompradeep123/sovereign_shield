name: SovereignShield DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ----------------------------------------------------
  # 1. SECRET SCANNING (Prevent Hardcoded Keys)
  # ----------------------------------------------------
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ----------------------------------------------------
  # 2. SAST (Static Application Security Testing)
  # ----------------------------------------------------
  sast-scan:
    name: Static Code Analysis (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
          generateSarif: "1"

  # ----------------------------------------------------
  # 3. SCA (Software Composition Analysis)
  # ----------------------------------------------------
  sca-audit:
    name: Dependency Audit Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Frontend NPM Audit
        run: cd frontend && npm install --package-lock-only && npm audit --audit-level=high || true
      - name: Backend NPM Audit
        run: cd backend && npm install --package-lock-only && npm audit --audit-level=high || true

  build-frontend:
    name: Build Frontend (Vite)
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, sca-audit]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Dependencies
        run: cd frontend && npm install
      - name: Build
        run: cd frontend && npm run build
      
  build-and-scan-backend:
    name: Build & SecScan Backend (Docker/Trivy)
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, sca-audit]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install Dependencies
        run: cd backend && npm install
      
      - name: Build Backend Docker Image
        run: |
          cd backend
          docker build -t sovereignshield-backend:latest .
          
      - name: Trivy Container Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sovereignshield-backend:latest'
          format: 'table'
          exit-code: '1' # Fails the build if HIGH/CRITICAL vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          
      - name: Mock Cloud Deployment
        run: echo "Initiating Secure Zero-Trust Deployment to AWS via Terraform..."
