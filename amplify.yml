version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install
            - echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
            - echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
            - echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" >> .env
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: frontend


